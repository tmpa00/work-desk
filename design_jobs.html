<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKAHASHI TASK — 案件管理</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Mono:wght@300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ec;
    --ink: #1a1714;
    --muted: #7a7570;
    --line: #d8d3cb;
    --accent: #2d5a3d;
    --accent2: #c84b2f;
    --card: #faf8f4;
    --tag-slack: #4a154b;
    --tag-backlog: #0052cc;
    --tag-verbal: #5a3e00;
    --prod-sign:  #00875a;
    --prod-corp:  #1b3f72;
    --prod-way:   #c45c1a;
    --prod-saiyo: #6b3fa0;
    --prod-wadax: #0e7a99;
    --panel-w: 360px;
    --col-wip:    #c0392b;
    --col-review: #c47a00;
    --col-done:   #888;
    --col-hold:   #a0a0a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 200px 1fr;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    grid-column: 1 / -1;
    border-bottom: 1px solid var(--line);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .hamburger span { display: block; width: 20px; height: 2px; background: var(--ink); border-radius: 2px; }
  .logo { font-family: 'DM Mono', monospace; font-weight: 300; font-size: 12px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
  .logo span { color: var(--ink); font-weight: 500; }
  .header-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }
  .btn-add { padding: 7px 14px; background: var(--ink); color: white; border: none; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; margin-left: 12px; }
  .btn-add:hover { opacity: 0.75; }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--line);
    padding: 20px 0;
    background: var(--card);
    position: sticky;
    top: 49px;
    height: calc(100vh - 49px);
    overflow-y: auto;
  }
  .sidebar-section { padding: 0 14px; margin-bottom: 20px; }
  .sidebar-divider { height: 1px; background: var(--line); margin: 4px 14px 16px; }
  .sidebar-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .filter-btn { display: flex; align-items: center; gap: 7px; width: 100%; padding: 6px 8px; background: none; border: none; border-radius: 4px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px; color: var(--ink); cursor: pointer; text-align: left; transition: background 0.15s; margin-bottom: 1px; }
  .filter-btn:hover { background: var(--line); }
  .filter-btn.active { background: var(--ink); color: white; }
  .filter-btn .count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.5; }
  .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .dot.round { border-radius: 50%; }

  /* ── Main / Kanban ── */
  main {
    padding: 20px 20px 40px;
    overflow-x: auto;
    overflow-y: auto;
  }

  .kanban {
    display: grid;
    grid-template-columns: repeat(4, minmax(240px, 1fr));
    gap: 14px;
    min-width: 960px;
    align-items: start;
  }

  /* ── Kanban column ── */
  .kanban-col { display: flex; flex-direction: column; gap: 0; }

  .kanban-col-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 7px 7px 0 0;
    border: 1px solid var(--line);
    border-bottom: none;
    background: var(--card);
    position: sticky;
    top: 0;
  }
  .kanban-col-header .col-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .kanban-col-header .col-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
  }
  .col-bar {
    height: 3px;
    border-radius: 0;
    margin: 0;
  }

  /* column accent colors */
  .col-wip    .col-bar { background: var(--col-wip); }
  .col-review .col-bar { background: var(--col-review); }
  .col-done   .col-bar { background: var(--col-done); }
  .col-hold   .col-bar { background: var(--col-hold); }
  .col-wip    .kanban-col-header { border-top: 2px solid var(--col-wip); }
  .col-review .kanban-col-header { border-top: 2px solid var(--col-review); }
  .col-done   .kanban-col-header { border-top: 2px solid var(--col-done); }
  .col-hold   .kanban-col-header { border-top: 2px solid var(--col-hold); }
  .col-wip    .col-label { color: var(--col-wip); }
  .col-review .col-label { color: var(--col-review); }
  .col-done   .col-label { color: var(--col-done); }
  .col-hold   .col-label { color: var(--col-hold); }

  .kanban-cards {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--line);
    border-top: none;
    border-radius: 0 0 7px 7px;
    overflow: hidden;
    background: #f0ede7;
    min-height: 60px;
    padding: 6px;
    gap: 6px;
  }

  /* ── Task card ── */
  .task-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 11px 12px;
    cursor: pointer;
    transition: box-shadow 0.15s, background 0.15s;
  }
  .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); background: #fff; }
  .task-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(45,90,61,0.15); }
  .task-card.urgent { border-left: 3px solid var(--accent2); }
  .col-done .task-card { opacity: 0.55; }

  .task-name { font-size: 12px; font-weight: 700; line-height: 1.4; margin-bottom: 7px; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .tag { padding: 1px 6px; border-radius: 3px; font-family: 'DM Mono', monospace; font-size: 9px; color: white; }
  .tag.slack   { background: var(--tag-slack); }
  .tag.backlog { background: var(--tag-backlog); }
  .tag.verbal  { background: var(--tag-verbal); }
  .tag.other   { background: var(--muted); }
  .tag.sign    { background: var(--prod-sign); }
  .tag.corp    { background: var(--prod-corp); }
  .tag.way     { background: var(--prod-way); }
  .tag.saiyo   { background: var(--prod-saiyo); }
  .tag.wadax   { background: var(--prod-wadax); }
  .tag.cat     { background: none; border: 1px solid currentColor; color: var(--muted); font-size: 9px; }
  .task-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .task-date.near { color: var(--accent2); font-weight: 500; }

  .col-empty { text-align: center; padding: 20px 0; color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; }

  /* ── Detail Panel ── */
  .detail-panel {
    position: fixed;
    top: 49px;
    right: 0;
    width: var(--panel-w);
    height: calc(100vh - 49px);
    background: var(--card);
    border-left: 1px solid var(--line);
    z-index: 90;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
  }
  .detail-panel.open { transform: translateX(0); }

  .panel-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; gap: 10px; position: sticky; top: 0; background: var(--card); z-index: 1; }
  .panel-title { flex: 1; font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 600; line-height: 1.4; outline: none; border: none; background: none; color: var(--ink); width: 100%; cursor: text; padding: 2px 4px; border-radius: 3px; transition: background 0.15s; }
  .panel-title:hover, .panel-title:focus { background: var(--bg); }
  .panel-close { width: 24px; height: 24px; border: none; background: none; cursor: pointer; font-size: 15px; color: var(--muted); flex-shrink: 0; border-radius: 4px; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
  .panel-close:hover { background: var(--line); }
  .panel-body { padding: 14px 18px; flex: 1; }

  .panel-status-row { display: flex; gap: 5px; margin-bottom: 16px; flex-wrap: wrap; }
  .status-chip { padding: 4px 11px; border-radius: 20px; font-family: 'DM Mono', monospace; font-size: 10px; border: 1px solid var(--line); background: none; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .status-chip:hover { border-color: #aaa; }
  .status-chip.active-wip    { border-color: var(--col-wip);    color: var(--col-wip);    background: #fdf0ef; font-weight:500; }
  .status-chip.active-review { border-color: var(--col-review); color: var(--col-review); background: #fdf6e3; }
  .status-chip.active-done   { border-color: var(--col-done);   color: var(--col-done);   background: #f5f5f5; }
  .status-chip.active-hold   { border-color: var(--col-hold);   color: var(--col-hold);   background: #f0ede8; }

  .panel-field { margin-bottom: 12px; }
  .panel-field-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .panel-input { width: 100%; padding: 6px 9px; background: var(--bg); border: 1px solid transparent; border-radius: 4px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px; color: var(--ink); transition: border-color 0.15s; }
  .panel-input:hover { border-color: var(--line); }
  .panel-input:focus { outline: none; border-color: var(--accent); background: #fff; }
  select.panel-input { cursor: pointer; }
  .panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .panel-divider { height: 1px; background: var(--line); margin: 14px 0; }

  .panel-footer { padding: 12px 18px; border-top: 1px solid var(--line); display: flex; gap: 8px; background: var(--card); position: sticky; bottom: 0; }
  .btn-save { flex: 1; padding: 8px; background: var(--ink); color: white; border: none; border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: opacity 0.2s; }
  .btn-save:hover { opacity: 0.75; }
  .btn-delete-sm { padding: 8px 12px; background: none; color: var(--accent2); border: 1px solid var(--accent2); border-radius: 5px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .btn-delete-sm:hover { background: var(--accent2); color: white; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,23,20,0.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 10px; padding: 24px; width: 440px; max-width: 92vw; max-height: 85vh; overflow-y: auto; }
  .modal-title { font-family: 'Shippori Mincho', serif; font-size: 16px; margin-bottom: 16px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field-group { margin-bottom: 10px; }
  .field-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .field-input { width: 100%; padding: 7px 9px; background: var(--bg); border: 1px solid var(--line); border-radius: 4px; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px; color: var(--ink); }
  .field-input:focus { outline: none; border-color: var(--accent); }
  select.field-input { cursor: pointer; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .btn-confirm { padding: 7px 14px; background: var(--accent); color: white; border: none; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; }
  .btn-cancel  { padding: 7px 14px; background: none; color: var(--muted); border: 1px solid var(--line); border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; }

  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 190; }
  .sidebar-overlay.open { display: block; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--ink); color: white; padding: 8px 16px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 11px; z-index: 300; transform: translateY(60px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; }
    .hamburger { display: flex; }
    .sidebar { position: fixed; top: 0; left: 0; width: 240px; height: 100vh; z-index: 200; transform: translateX(-100%); transition: transform 0.28s ease; padding-top: 56px; }
    .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.15); }
    .kanban { grid-template-columns: repeat(4, minmax(200px, 1fr)); }
    .detail-panel { width: 100vw; }
  }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app">
  <header>
    <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
    <div class="logo">TAKAHASHI <span>TASK</span></div>
    <div class="header-date" id="headerDate"></div>
    <button class="btn-add" onclick="openNewModal()">+ 手動で追加</button>
  </header>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">商材</div>
      <button class="filter-btn active" onclick="setFilter('all','all',this)">
        <span>すべて</span><span class="count" id="cnt-all">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('sign','product',this)">
        <span class="dot" style="background:var(--prod-sign)"></span><span>GMOサイン</span><span class="count" id="cnt-sign">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('corp','product',this)">
        <span class="dot" style="background:var(--prod-corp)"></span><span>コーポレート</span><span class="count" id="cnt-corp">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('way','product',this)">
        <span class="dot" style="background:var(--prod-way)"></span><span>Way</span><span class="count" id="cnt-way">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('saiyo','product',this)">
        <span class="dot" style="background:var(--prod-saiyo)"></span><span>採用</span><span class="count" id="cnt-saiyo">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('wadax','product',this)">
        <span class="dot" style="background:var(--prod-wadax)"></span><span>WADAX</span><span class="count" id="cnt-wadax">0</span>
      </button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">カテゴリ</div>
      <button class="filter-btn" onclick="setFilter('web','category',this)">
        <span class="dot round" style="background:#2a6e4e"></span><span>Web</span><span class="count" id="cnt-web">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('illust','category',this)">
        <span class="dot round" style="background:#8a3060"></span><span>イラスト</span><span class="count" id="cnt-illust">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('dtp','category',this)">
        <span class="dot round" style="background:#555"></span><span>DTP</span><span class="count" id="cnt-dtp">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('bnr','category',this)">
        <span class="dot round" style="background:#a05020"></span><span>bnr</span><span class="count" id="cnt-bnr">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('lp','category',this)">
        <span class="dot round" style="background:#1e5a8a"></span><span>LP</span><span class="count" id="cnt-lp">0</span>
      </button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">依頼経路</div>
      <button class="filter-btn" onclick="setFilter('slack','source',this)">
        <span class="dot" style="background:var(--tag-slack)"></span><span>Slack</span><span class="count" id="cnt-slack">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('backlog','source',this)">
        <span class="dot" style="background:var(--tag-backlog)"></span><span>Backlog</span><span class="count" id="cnt-backlog">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('verbal','source',this)">
        <span class="dot" style="background:var(--tag-verbal)"></span><span>口頭・MTG</span><span class="count" id="cnt-verbal">0</span>
      </button>
    </div>
  </aside>

  <main>
    <div class="kanban" id="kanban">
      <div class="kanban-col col-wip">
        <div class="kanban-col-header">
          <span class="col-label">進行中</span>
          <span class="col-count" id="hd-wip">0</span>
        </div>
        <div class="kanban-cards" id="col-wip"></div>
      </div>
      <div class="kanban-col col-review">
        <div class="kanban-col-header">
          <span class="col-label">確認中</span>
          <span class="col-count" id="hd-review">0</span>
        </div>
        <div class="kanban-cards" id="col-review"></div>
      </div>
      <div class="kanban-col col-done">
        <div class="kanban-col-header">
          <span class="col-label">完了</span>
          <span class="col-count" id="hd-done">0</span>
        </div>
        <div class="kanban-cards" id="col-done"></div>
      </div>
      <div class="kanban-col col-hold">
        <div class="kanban-col-header">
          <span class="col-label">保留</span>
          <span class="col-count" id="hd-hold">0</span>
        </div>
        <div class="kanban-cards" id="col-hold"></div>
      </div>
    </div>
  </main>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <input class="panel-title" id="p-name" type="text" placeholder="案件名">
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="panel-status-row" id="statusChips">
      <button class="status-chip" data-s="wip"    onclick="setStatus('wip')">進行中</button>
      <button class="status-chip" data-s="review" onclick="setStatus('review')">確認中</button>
      <button class="status-chip" data-s="done"   onclick="setStatus('done')">完了</button>
      <button class="status-chip" data-s="hold"   onclick="setStatus('hold')">保留</button>
    </div>
    <div class="panel-row">
      <div class="panel-field">
        <div class="panel-field-label">商材</div>
        <select class="panel-input" id="p-product">
          <option value="">— なし —</option>
          <option value="sign">GMOサイン</option>
          <option value="corp">コーポレート</option>
          <option value="way">Way</option>
          <option value="saiyo">採用</option>
          <option value="wadax">WADAX</option>
        </select>
      </div>
      <div class="panel-field">
        <div class="panel-field-label">カテゴリ</div>
        <select class="panel-input" id="p-category">
          <option value="">— なし —</option>
          <option value="web">Web</option>
          <option value="illust">イラスト</option>
          <option value="dtp">DTP</option>
          <option value="bnr">bnr</option>
          <option value="lp">LP</option>
        </select>
      </div>
    </div>
    <div class="panel-row">
      <div class="panel-field">
        <div class="panel-field-label">依頼経路</div>
        <select class="panel-input" id="p-source">
          <option value="slack">Slack</option>
          <option value="backlog">Backlog</option>
          <option value="verbal">口頭・MTG</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="panel-field">
        <div class="panel-field-label">依頼者</div>
        <input class="panel-input" id="p-client" type="text" placeholder="田中さん">
      </div>
    </div>
    <div class="panel-field">
      <div class="panel-field-label">依頼元 URL</div>
      <div style="display:flex;gap:6px;align-items:center">
        <input class="panel-input" id="p-source-url" type="url" placeholder="https://xxx.backlog.com/view/PROJ-123" style="flex:1">
        <a id="p-source-url-link" href="#" target="_blank" style="display:none;color:var(--accent);font-size:18px;text-decoration:none;flex-shrink:0">↗</a>
      </div>
    </div>
    <div class="panel-field">
      <div class="panel-field-label">作業場所</div>
      <div style="display:flex;gap:6px;align-items:center">
        <input class="panel-input" id="p-work-url" type="text" placeholder="https://figma.com/... または メモ" style="flex:1">
        <a id="p-work-url-link" href="#" target="_blank" style="display:none;color:var(--accent);font-size:18px;text-decoration:none;flex-shrink:0">↗</a>
      </div>
    </div>
    <div class="panel-divider"></div>
    <div class="panel-field">
      <div class="panel-field-label">受注日</div>
      <input class="panel-input" id="p-received" type="date">
    </div>
    <div class="panel-row">
      <div class="panel-field">
        <div class="panel-field-label">初校締切</div>
        <input class="panel-input" id="p-draft" type="date">
      </div>
      <div class="panel-field">
        <div class="panel-field-label">Fix締切</div>
        <input class="panel-input" id="p-fix" type="date">
      </div>
    </div>
    <div class="panel-divider"></div>
    <div class="panel-field">
      <div class="panel-field-label">メモ</div>
      <input class="panel-input" id="p-memo" type="text" placeholder="補足など">
    </div>
  </div>
  <div class="panel-footer">
    <button class="btn-save" onclick="savePanel()">保存</button>
    <button class="btn-delete-sm" onclick="deletePanelTask()">削除</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">案件を追加</div>
    <div class="field-group">
      <div class="field-label">案件名</div>
      <input class="field-input" id="f-name" placeholder="GMOサイン LP制作">
    </div>
    <div class="field-row">
      <div class="field-group" style="margin-bottom:0">
        <div class="field-label">商材</div>
        <select class="field-input" id="f-product">
          <option value="">— なし —</option>
          <option value="sign">GMOサイン</option>
          <option value="corp">コーポレート</option>
          <option value="way">Way</option>
          <option value="saiyo">採用</option>
          <option value="wadax">WADAX</option>
        </select>
      </div>
      <div class="field-group" style="margin-bottom:0">
        <div class="field-label">カテゴリ</div>
        <select class="field-input" id="f-category">
          <option value="">— なし —</option>
          <option value="web">Web</option>
          <option value="illust">イラスト</option>
          <option value="dtp">DTP</option>
          <option value="bnr">bnr</option>
          <option value="lp">LP</option>
        </select>
      </div>
    </div>
    <div style="height:10px"></div>
    <div class="field-row">
      <div class="field-group" style="margin-bottom:0">
        <div class="field-label">依頼経路</div>
        <select class="field-input" id="f-source">
          <option value="slack">Slack</option>
          <option value="backlog">Backlog</option>
          <option value="verbal">口頭・MTG</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="field-group" style="margin-bottom:0">
        <div class="field-label">依頼者</div>
        <input class="field-input" id="f-client" placeholder="田中さん">
      </div>
    </div>
    <div style="height:10px"></div>
    <div class="field-row">
      <div class="field-group" style="margin-bottom:0">
        <div class="field-label">受注日</div>
        <input class="field-input" type="date" id="f-received">
      </div>
      <div class="field-group" style="margin-bottom:0">
        <div class="field-label">ステータス</div>
        <select class="field-input" id="f-status">
          <option value="wip">進行中</option>
          <option value="review">確認中</option>
          <option value="done">完了</option>
          <option value="hold">保留</option>
        </select>
      </div>
    </div>
    <div style="height:10px"></div>
    <div class="field-row">
      <div class="field-group" style="margin-bottom:0">
        <div class="field-label">初校締切</div>
        <input class="field-input" type="date" id="f-draft">
      </div>
      <div class="field-group" style="margin-bottom:0">
        <div class="field-label">Fix締切</div>
        <input class="field-input" type="date" id="f-fix">
      </div>
    </div>
    <div style="height:10px"></div>
    <div class="field-group">
      <div class="field-label">メモ</div>
      <input class="field-input" id="f-memo" placeholder="補足など">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-confirm" onclick="saveFromModal()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'workdesk_tasks_v3';
function loadTasks() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; } }
function saveTasks(t) { localStorage.setItem(STORAGE_KEY, JSON.stringify(t)); }

let tasks = loadTasks();
let currentFilter = 'all';
let currentFilterType = 'all';
let panelTaskId = null;

const PRODUCT_LABEL  = { sign:'GMOサイン', corp:'コーポレート', way:'Way', saiyo:'採用', wadax:'WADAX' };
const CATEGORY_LABEL = { web:'Web', illust:'イラスト', dtp:'DTP', bnr:'bnr', lp:'LP' };
const SOURCE_LABEL   = { slack:'Slack', backlog:'Backlog', verbal:'口頭', other:'other' };
const STATUS_COLS    = ['wip','review','done','hold'];

function today() { return new Date().toISOString().slice(0,10); }
function daysUntil(d) {
  if (!d) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((new Date(d)-now)/86400000);
}
function fmtDate(d) {
  if (!d) return '—';
  const x = new Date(d);
  return `${x.getMonth()+1}/${x.getDate()}`;
}

function updateHeaderDate() {
  const d = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('headerDate').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}

function updateCounts() {
  const s = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
  s('cnt-all', tasks.length);
  ['sign','corp','way','saiyo','wadax'].forEach(x => s(`cnt-${x}`, tasks.filter(t=>t.product===x).length));
  ['web','illust','dtp','bnr','lp'].forEach(x => s(`cnt-${x}`, tasks.filter(t=>t.category===x).length));
  ['slack','backlog','verbal'].forEach(x => s(`cnt-${x}`, tasks.filter(t=>t.source===x).length));
}

function setFilter(f, type, btn) {
  currentFilter = f; currentFilterType = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filteredTasks() {
  if (currentFilterType === 'all') return tasks;
  if (currentFilterType === 'product')  return tasks.filter(t=>t.product===currentFilter);
  if (currentFilterType === 'category') return tasks.filter(t=>t.category===currentFilter);
  if (currentFilterType === 'source')   return tasks.filter(t=>t.source===currentFilter);
  return tasks;
}

function render() {
  updateCounts();
  const visible = filteredTasks();

  STATUS_COLS.forEach(status => {
    const col = document.getElementById(`col-${status}`);
    const hd  = document.getElementById(`hd-${status}`);
    const colTasks = visible
      .filter(t => t.status === status)
      .sort((a,b) => {
        if (a.fix&&b.fix) return a.fix.localeCompare(b.fix);
        if (a.fix) return -1; if (b.fix) return 1; return 0;
      });

    hd.textContent = colTasks.length;

    if (colTasks.length === 0) {
      col.innerHTML = '<div class="col-empty">—</div>';
      return;
    }

    col.innerHTML = colTasks.map(t => {
      const days = daysUntil(t.fix);
      const isUrgent = days!==null && days<=3 && status!=='done';
      const dateNear = days!==null && days<=7 && status!=='done';
      let dl = '';
      if (t.fix) { if(days===0) dl='今日'; else if(days<0) dl=`${Math.abs(days)}日超過`; else dl=`${days}日後`; }
      const prodTag  = t.product  ? `<span class="tag ${t.product}">${PRODUCT_LABEL[t.product]}</span>` : '';
      const catTag   = t.category ? `<span class="tag cat">${CATEGORY_LABEL[t.category]}</span>` : '';
      const isSelected = t.id === panelTaskId;

      return `<div class="task-card ${isUrgent?'urgent':''} ${isSelected?'selected':''}" onclick="openPanel('${t.id}')">
        <div class="task-name">${t.name||'（無題）'}</div>
        <div class="task-meta">
          ${prodTag}${catTag}
          ${t.client ? `<span class="task-date">${t.client}</span>` : ''}
          ${t.fix ? `<span class="task-date ${dateNear?'near':''}">Fix ${fmtDate(t.fix)}${dl?` (${dl})`:''}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  });
}

// ── Panel ──
function openPanel(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  panelTaskId = id;
  document.getElementById('p-name').value      = t.name||'';
  document.getElementById('p-product').value   = t.product||'';
  document.getElementById('p-category').value  = t.category||'';
  document.getElementById('p-source').value    = t.source||'slack';
  document.getElementById('p-client').value    = t.client||'';
  document.getElementById('p-source-url').value= t.sourceUrl||'';
  document.getElementById('p-work-url').value  = t.workUrl||'';
  document.getElementById('p-received').value  = t.received||'';
  document.getElementById('p-draft').value     = t.draft||'';
  document.getElementById('p-fix').value       = t.fix||'';
  document.getElementById('p-memo').value      = t.memo||'';
  updateStatusChips(t.status);

  const sInput = document.getElementById('p-source-url');
  const wInput = document.getElementById('p-work-url');
  const sLink  = document.getElementById('p-source-url-link');
  const wLink  = document.getElementById('p-work-url-link');
  function updateLink(input, link) {
    const v = input.value.trim();
    const isUrl = v.startsWith('http://') || v.startsWith('https://');
    link.style.display = (v&&isUrl) ? 'inline' : 'none';
    if (isUrl) link.href = v;
  }
  updateLink(sInput, sLink); updateLink(wInput, wLink);
  sInput.oninput = () => updateLink(sInput, sLink);
  wInput.oninput = () => updateLink(wInput, wLink);

  document.getElementById('detailPanel').classList.add('open');
  render();
}

function closePanel() {
  panelTaskId = null;
  document.getElementById('detailPanel').classList.remove('open');
  render();
}

function updateStatusChips(status) {
  document.querySelectorAll('.status-chip').forEach(c => {
    c.className = 'status-chip';
    if (c.dataset.s === status) c.classList.add(`active-${status}`);
  });
}

function setStatus(s) {
  updateStatusChips(s);
  const t = tasks.find(t=>t.id===panelTaskId);
  if (t) { t.status = s; saveTasks(tasks); render(); }
}

function savePanel() {
  const idx = tasks.findIndex(t=>t.id===panelTaskId);
  if (idx < 0) return;
  const status = document.querySelector('.status-chip[class*="active-"]')?.dataset.s || tasks[idx].status;
  tasks[idx] = {
    ...tasks[idx],
    name:      document.getElementById('p-name').value.trim(),
    product:   document.getElementById('p-product').value||null,
    category:  document.getElementById('p-category').value||null,
    source:    document.getElementById('p-source').value,
    client:    document.getElementById('p-client').value.trim(),
    sourceUrl: document.getElementById('p-source-url').value.trim(),
    workUrl:   document.getElementById('p-work-url').value.trim(),
    received:  document.getElementById('p-received').value,
    draft:     document.getElementById('p-draft').value,
    fix:       document.getElementById('p-fix').value,
    status,
    memo:      document.getElementById('p-memo').value.trim(),
  };
  saveTasks(tasks);
  render();
  showToast('保存しました ✓');
}

function deletePanelTask() {
  if (!confirm('この案件を削除しますか？')) return;
  tasks = tasks.filter(t=>t.id!==panelTaskId);
  saveTasks(tasks);
  closePanel();
  showToast('削除しました');
}

// ── Modal ──
function openNewModal() {
  document.getElementById('f-name').value     = '';
  document.getElementById('f-product').value  = '';
  document.getElementById('f-category').value = '';
  document.getElementById('f-source').value   = 'slack';
  document.getElementById('f-client').value   = '';
  document.getElementById('f-received').value = today();
  document.getElementById('f-draft').value    = '';
  document.getElementById('f-fix').value      = '';
  document.getElementById('f-status').value   = 'wip';
  document.getElementById('f-memo').value     = '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveFromModal() {
  const t = {
    id: crypto.randomUUID(),
    name:     document.getElementById('f-name').value.trim(),
    product:  document.getElementById('f-product').value||null,
    category: document.getElementById('f-category').value||null,
    source:   document.getElementById('f-source').value,
    client:   document.getElementById('f-client').value.trim(),
    received: document.getElementById('f-received').value,
    draft:    document.getElementById('f-draft').value,
    fix:      document.getElementById('f-fix').value,
    status:   document.getElementById('f-status').value,
    memo:     document.getElementById('f-memo').value.trim(),
    sourceUrl: '', workUrl: '',
  };
  if (!t.name) { showToast('案件名を入力してください'); return; }
  tasks.unshift(t);
  saveTasks(tasks);
  closeModal();
  render();
  showToast('追加しました ✓');
}

document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

updateHeaderDate();
render();
</script>
</body>
</html>
